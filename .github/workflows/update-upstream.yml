name: Update upstream Beads UI

on:
  workflow_dispatch:
    inputs:
      version:
        description: Upstream version without the leading v. Leave empty for latest.
        required: false
        type: string
  schedule:
    - cron: '23 7 * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out packaging repo
        uses: actions/checkout@v4

      - name: Install packaging script dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git

      - name: Update spec
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            ./scripts/update-version.sh "${{ inputs.version }}"
          else
            ./scripts/update-version.sh
          fi

      - name: Commit update
        run: |
          if git diff --quiet; then
            echo "No upstream update found."
            exit 0
          fi

          version="$(awk '$1 == "Version:" { print $2; exit }' beads-ui.spec)"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add beads-ui.spec
          git commit -m "Update beads-ui to ${version}"
          git push
